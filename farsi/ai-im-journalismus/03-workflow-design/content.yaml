version: 1
number: 3
title: "طراحی گردش‌کار هوش مصنوعی"
description: "گردش‌کارهای روشن و امن برای استفاده از هوش مصنوعی در تحریریه‌ها"
sections:
  - title: "یکپارچه‌سازی گام‌به‌گام هوش مصنوعی"
    explanation: |
      یکپارچه‌سازی هوش مصنوعی در تحریریه‌ها معمولاً از چهار مرحله پیروی می‌کند:

      **مرحله ۱: ارزیابی و برنامه‌ریزی**
      - تشکیل هیئت هوش مصنوعی با متخصصان فناوری اطلاعات، حقوقی، منابع انسانی و تحریریه
      - تحلیل نیازها: افراد در تحریریه به چه چیزی نیاز دارند؟
      - ارزیابی زیرساخت و منابع موجود

      **مرحله ۲: پروژه‌های آزمایشی و تست**
      - شروع با پروژه‌های آزمایشی کوچک و کم‌خطر (مثلاً برچسب‌گذاری فراداده، رونویسی صوتی)
      - ایجاد محیط‌های آزمایشی ایمن
      - مهندسی پرامپت مشترک با نویسندگان با استفاده از مقالات واقعی

      **مرحله ۳: اجرای عملیاتی**
      - گسترش تدریجی به حوزه‌های کاربردی بیشتر
      - سه‌چهارم هزینه‌های هوش مصنوعی صرف کار تحریریه و تولید محتوا می‌شود

      **مرحله ۴: حکمرانی و شفافیت**
      - تعیین الزامات افشا و قوانین نویسندگی
      - ارزیابی و تطبیق منظم دستورالعمل‌ها
    examples:
      - q: "اولین گام در یکپارچه‌سازی هوش مصنوعی در تحریریه چه باید باشد؟"
        a: "تشکیل هیئت هوش مصنوعی با متخصصان فناوری اطلاعات، حقوقی، منابع انسانی و بخش‌های مختلف تحریریه برای ارزیابی اولیه"
        rel:
          - ["KI-Board", "تیم بین‌رشته‌ای برای یکپارچه‌سازی هوش مصنوعی"]
          - ["Bestandsaufnahme", "اولین گام یکپارچه‌سازی هوش مصنوعی"]

      - q: "چرا باید با پروژه‌های آزمایشی شروع کرد؟"
        a: "پروژه‌های آزمایشی کم‌خطر هستند، اعتماد در تیم ایجاد می‌کنند و تجربه عملی فراهم می‌کنند قبل از معرفی گسترده هوش مصنوعی"
        rel:
          - ["Pilotprojekt", "ورود کم‌خطر به استفاده از هوش مصنوعی"]
          - ["Sandbox-Umgebung", "محیط محافظت‌شده برای تست ابزارهای هوش مصنوعی"]

      - q: "محیط آزمایشی برای تست هوش مصنوعی چیست؟"
        a: "محیط محافظت‌شده‌ای که در آن ابزارهای هوش مصنوعی بدون تأثیر بر فرآیندها یا داده‌های واقعی تحریریه تست می‌شوند"
        rel:
          - ["Sandbox", "محیط تست محافظت‌شده برای آزمایش‌های هوش مصنوعی"]

      - q: "چرا تنها ۱۳٪ از تحریریه‌ها دستورالعمل‌های رسمی هوش مصنوعی دارند؟"
        a: "زیرا فناوری به سرعت تکامل می‌یابد و بسیاری از تحریریه‌ها هنوز در مرحله آزمایش هستند -- اما حکمرانی رسمی فوری مورد نیاز است"
        rel:
          - ["KI-Governance", "قوانین و ساختارهای رسمی برای استفاده از هوش مصنوعی"]

  - title: "نقاط استقرار هوش مصنوعی در تحریریه"
    explanation: |
      هوش مصنوعی می‌تواند در نقاط مختلف گردش‌کار تحریریه به‌طور معناداری مستقر شود:

      - **تحقیق**: کشف موضوع مبتنی بر هوش مصنوعی، تحقیق منابع، تحلیل اسناد
      - **رونویسی**: رونویسی خودکار مصاحبه‌ها و کنفرانس‌های مطبوعاتی
      - **ساختاردهی**: خلاصه‌سازی، برچسب‌گذاری فراداده، نمایه‌سازی کلیدواژه
      - **پیش‌نویس متن**: پیش‌نویس‌های اولیه برای گزارش‌های مبتنی بر داده (ورزش، بورس، آب‌وهوا)
      - **ترجمه**: دسترسی سریع به مواد منبع به زبان خارجی
      - **جامعه**: هوش مصنوعی نظرات مرتبط خوانندگان را شناسایی و به تیم تحریریه ارجاع می‌دهد

      دی‌پی‌ای مثلاً از «رادار داستان» استفاده می‌کند که شبکه‌های اجتماعی را برای موضوعات مرتبط جستجو می‌کند.
    examples:
      - q: "هوش مصنوعی برای کدام کارهای روتین در تحریریه مناسب است؟"
        a: "رونویسی، ترجمه، خلاصه‌سازی، برچسب‌گذاری فراداده، نمایه‌سازی کلیدواژه و پیش‌نویس‌های متنی مبتنی بر داده"
        rel:
          - ["Routineaufgaben", "کارهای تکراری که هوش مصنوعی می‌تواند تسریع کند"]
          - ["Metadaten-Tagging", "نمایه‌سازی خودکار کلیدواژه مقالات"]

      - q: "رادار داستان دی‌پی‌ای چیست؟"
        a: "ابزار هوش مصنوعی که شبکه‌های اجتماعی را برای موضوعات مرتبط جستجو و خبرنگاران را از داستان‌های جالب آگاه می‌کند"
        rel:
          - ["Story-Radar", "کشف موضوع مبتنی بر هوش مصنوعی توسط دی‌پی‌ای"]

      - q: "هوش مصنوعی چگونه می‌تواند در مدیریت جامعه کمک کند؟"
        a: "هوش مصنوعی نظرات مرتبط خوانندگان را شناسایی و به‌طور خودکار از طریق Teams یا Slack به تیم تحریریه مسئول ارسال می‌کند"
        rel:
          - ["Community-Management", "تحلیل نظرات خوانندگان مبتنی بر هوش مصنوعی"]

      - q: "گزارش‌دهی خودکار برای چه نوع متونی مناسب است؟"
        a: "برای فرمت‌های تکراری مبتنی بر داده مانند گزارش‌های ورزشی، بورسی و آب‌وهوایی که بر داده‌های ساختاریافته مبتنی هستند"
        rel:
          - ["Automatisierte Berichterstattung", "تولید متن از داده‌های ساختاریافته"]

  - title: "تحویل بین انسان و هوش مصنوعی"
    explanation: |
      نقاط تحویل روشن برای کیفیت حیاتی هستند. مفهوم تعریف می‌کند:

      - **مراحل بازبینی تعریف‌شده قبل از انتشار**: هر خروجی هوش مصنوعی از نظر تحریریه بازبینی می‌شود
      - **اصل چهار چشم**: محتوای تولیدشده توسط هوش مصنوعی مانند گزارش‌های خبرگزاری رفتار می‌شود -- نیاز به بازبینی انسانی دوم دارد
      - **مستندسازی استفاده از هوش مصنوعی**: در فرآیند تحریریه ثبت می‌شود که کجا از هوش مصنوعی استفاده شده
      - **هوش مصنوعی به عنوان ابزار**: هوش مصنوعی کار مقدماتی ارائه می‌دهد، روزنامه‌نگار تصمیم می‌گیرد

      MinnPost مواد تولیدشده توسط هوش مصنوعی را مانند منبعی رفتار می‌کند که نیاز به
      ویرایش انسانی و راستی‌آزمایی دارد.
    examples:
      - q: "اصل چهار چشم برای محتوای تولیدشده توسط هوش مصنوعی چه معنایی دارد؟"
        a: "محتوای تولیدشده توسط هوش مصنوعی مانند گزارش‌های خبرگزاری رفتار می‌شود -- حداقل یک نفر دیگر محتوا را قبل از انتشار بازبینی می‌کند"
        rel:
          - ["Vier-Augen-Prinzip", "بازبینی انسانی دوم خروجی هوش مصنوعی"]

      - q: "MinnPost چگونه با مواد تولیدشده توسط هوش مصنوعی رفتار می‌کند؟"
        a: "مانند منبعی که نیاز به ویرایش انسانی و راستی‌آزمایی دارد -- خروجی هوش مصنوعی ماده خام است، نه مقاله تمام‌شده"
        rel:
          - ["KI als Quelle", "رفتار با خروجی هوش مصنوعی به عنوان ماده خام"]

      - q: "چرا مستندسازی استفاده از هوش مصنوعی مهم است؟"
        a: "شفافیت در فرآیند تحریریه ایجاد می‌کند، قابلیت ردیابی را فراهم می‌کند و پایه‌ای برای ممیزی‌ها و کنترل‌های کیفیت بعدی است"
        rel:
          - ["KI-Dokumentation", "ثبت اینکه کجا و چگونه از هوش مصنوعی استفاده شده"]

      - q: "ایده اصلی طراحی گردش‌کار هوش مصنوعی چیست؟"
        a: "هوش مصنوعی به عنوان ابزار -- نه جایگزین قضاوت روزنامه‌نگارانه. قوانین روشن تعریف می‌کنند که کجا هوش مصنوعی می‌تواند کمک کند و کجا انسان تصمیم می‌گیرد"
        rel:
          - ["KI als Werkzeug", "اصل بنیادی طراحی گردش‌کار هوش مصنوعی"]
