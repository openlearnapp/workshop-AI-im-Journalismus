version: 1
number: 10
title: "اصول راهنما و توسعه شایستگی"
description: "ارزش‌های مشترک و آموزش برای استفاده مستقل از هوش مصنوعی"
sections:
  - title: "هفت اصل راهنما"
    explanation: |
      این اصول به عنوان قطب‌نمای مشترک برای روزنامه‌نگاری مبتنی بر هوش مصنوعی عمل می‌کنند:

      ۱. **هوش مصنوعی قضاوت را تکمیل می‌کند، جایگزین نمی‌کند** -- ماشین‌ها متن ارائه می‌دهند، انسان‌ها مسئولیت دارند
      ۲. **شفافیت اعتماد ایجاد می‌کند** -- خوانندگان باید بتوانند درک کنند آیا و چگونه از هوش مصنوعی استفاده شده
      ۳. **تأیید اجتناب‌ناپذیر است** -- ادعاهای هوش مصنوعی فرضیه‌اند، نه حقایق
      ۴. **حفاظت از منابع بر کارایی اولویت دارد** -- اطلاعات حساس جایشان در سیستم‌های خارجی نیست
      ۵. **سرعت هدف نیست** -- سریع و اشتباه بدتر از آهسته و درست است
      ۶. **توسعه شایستگی به جای وابستگی** -- تحریریه‌ها باید هوش مصنوعی را درک کنند، نه فقط استفاده کنند
      ۷. **اخلاق یک فرآیند است** -- قوانین روشن و استانداردهای قابل بررسی ضروری هستند
    examples:
      - q: "اصل 'هوش مصنوعی قضاوت را تکمیل می‌کند، جایگزین نمی‌کند' چه معنایی دارد؟"
        a: "ماشین‌ها متن و کار مقدماتی ارائه می‌دهند، اما مسئولیت تحریریه و قضاوت روزنامه‌نگارانه با انسان باقی می‌ماند"
        rel:
          - ["Menschliche Urteilskraft", "هوش مصنوعی تکمیل می‌کند، جایگزین نمی‌کند"]

      - q: "'سرعت هدف نیست' چه معنایی دارد؟"
        a: "سریع و اشتباه بدتر از آهسته و درست است -- هوش مصنوعی نباید منجر شود که کیفیت و دقت فدای سرعت شوند"
        rel:
          - ["Qualitaet vor Geschwindigkeit", "سریع و اشتباه بدتر از آهسته و درست است"]

      - q: "'توسعه شایستگی به جای وابستگی' چه معنایی دارد؟"
        a: "تحریریه‌ها باید هوش مصنوعی را درک کنند، نه فقط استفاده کنند -- هدف مدیریت مستقل به جای وابستگی کورکورانه به ارائه‌دهندگان هوش مصنوعی است"
        rel:
          - ["KI-Souveraenitaet", "درک به جای صرفاً استفاده"]

      - q: "چرا اخلاق یک فرآیند است و نه یک وضعیت؟"
        a: "زیرا فناوری هوش مصنوعی به سرعت تکامل می‌یابد و استانداردهای اخلاقی باید به طور مداوم بازبینی، تطبیق و توسعه یابند"
        rel:
          - ["Ethik als Prozess", "توسعه مداوم استانداردهای اخلاقی"]

  - title: "توسعه شایستگی و آموزش"
    explanation: |
      استفاده پایدار از هوش مصنوعی از طریق دانش و تمرین ایجاد می‌شود. برنامه‌های کلیدی:

      **بین‌المللی:**
      - **JournalismAI Skills Lab** (POLIS/LSE): ۱۲ هفته، مجازی، رایگان -- برنامه‌ریزی برای آموزش ۴,۵۰۰ روزنامه‌نگار از ۱۰۰ کشور
      - **CUNY AI Journalism Labs**: تمرکز بر رهبری و اجرای عملی هوش مصنوعی
      - **Knight Center**: دوره‌های آنلاین مهندسی پرامپت و ابزارهای هوش مصنوعی گوگل برای روزنامه‌نگاران

      **آلمان:**
      - **dpa «راهنمای هوش مصنوعی»**: برنامه آموزشی عملی‌محور برای تحریریه‌های آلمانی (۲۰۲۴-۲۰۲۵)
      - **BJV**: آموزش‌های استفاده از هوش مصنوعی در تحریریه‌ها

      روزنامه‌نگاران با تخصص هوش مصنوعی به طور متوسط **۱۲٪ بیشتر** از همکاران
      بدون این مهارت‌ها درآمد دارند و تقاضا **بیش از ۳۰٪** افزایش یافته.
    examples:
      - q: "JournalismAI Skills Lab چیست؟"
        a: "برنامه‌ای ۱۲ هفته‌ای، مجازی و رایگان از POLIS/LSE برای اجرای عملی هوش مصنوعی در عملیات تحریریه -- برنامه‌ریزی برای ۴,۵۰۰ روزنامه‌نگار از ۱۰۰ کشور"
        rel:
          - ["JournalismAI Skills Lab", "آموزش رایگان هوش مصنوعی برای روزنامه‌نگاران"]

      - q: "چه برنامه آموزش هوش مصنوعی به‌طور خاص برای تحریریه‌های آلمانی وجود دارد؟"
        a: "برنامه دی‌پی‌ای «راهنمای هوش مصنوعی» -- برنامه آموزشی عملی‌محور که در ۲۰۲۴-۲۰۲۵ از تحریریه‌های آلمانی در یکپارچه‌سازی هوش مصنوعی پشتیبانی کرد"
        rel:
          - ["dpa Wegweiser KI", "برنامه آموزشی آلمانی برای تحریریه‌ها"]

      - q: "شایستگی هوش مصنوعی چگونه بر حقوق روزنامه‌نگاران تأثیر می‌گذارد؟"
        a: "روزنامه‌نگاران با تخصص هوش مصنوعی به طور متوسط ۱۲٪ بیشتر درآمد دارند -- تقاضا برای مهارت‌های هوش مصنوعی بیش از ۳۰٪ افزایش یافته"
        rel:
          - ["KI-Gehaltspraemie", "۱۲٪ درآمد بیشتر با تخصص هوش مصنوعی"]

      - q: "Knight Center چه دوره‌های مرتبط با هوش مصنوعی ارائه می‌دهد؟"
        a: "Prompt Engineering 101 for Journalists و Google AI Tools for Journalists -- هر دو به صورت آنلاین، دومی ۴ هفته و رایگان"
        rel:
          - ["Knight Center", "دوره‌های آنلاین هوش مصنوعی برای روزنامه‌نگاران"]

  - title: "پنج شایستگی کلیدی برای آینده"
    explanation: |
      روزنامه‌نگاران به طور فزاینده به این پنج شایستگی نیاز دارند:

      ۱. **سواد داده**: تفسیر و تحلیل مجموعه داده‌های بزرگ، تحلیل مبتنی بر هوش مصنوعی
      ۲. **مبانی فنی**: درک پلتفرم‌های هوش مصنوعی، NLP و ابزارهای اتوماسیون
      ۳. **تفکر انتقادی**: ارزیابی و زمینه‌سازی خروجی‌های هوش مصنوعی
      ۴. **مهندسی پرامپت**: توانایی تنظیم دستورالعمل‌های دقیق برای سیستم‌های هوش مصنوعی
      ۵. **شایستگی اخلاقی**: درک حق نشر، انتساب، سوگیری و شفافیت

      در عین حال، مهارت‌هایی ضروری باقی می‌مانند که هوش مصنوعی **نمی‌تواند جایگزین کند**:
      همدلی انسانی، قضاوت اخلاقی، داستان‌سرایی خلاقانه،
      ایجاد رابطه با منابع و زمینه‌سازی مسائل پیچیده.

      هدف تولید بیشتر به هر قیمتی نیست، بلکه: کیفیت تضمین‌شده،
      منابع محافظت‌شده، فرآیندهای روشن، استفاده مستقل از هوش مصنوعی و اعتماد
      بلندمدت خوانندگان.
    examples:
      - q: "روزنامه‌نگاران برای آینده هوش مصنوعی به چه پنج شایستگی کلیدی نیاز دارند؟"
        a: "سواد داده، مبانی فنی، تفکر انتقادی، مهندسی پرامپت و شایستگی اخلاقی"
        rel:
          - ["Zukunftskompetenzen", "پنج شایستگی کلیدی برای روزنامه‌نگاری هوش مصنوعی"]

      - q: "کدام مهارت‌ها را هوش مصنوعی نمی‌تواند جایگزین کند؟"
        a: "همدلی انسانی، قضاوت اخلاقی، داستان‌سرایی خلاقانه، ایجاد رابطه با منابع و زمینه‌سازی مسائل پیچیده"
        rel:
          - ["Menschliche Staerken", "مهارت‌هایی که هوش مصنوعی نمی‌تواند جایگزین کند"]

      - q: "چرا سواد داده برای روزنامه‌نگاران مهم‌تر شده؟"
        a: "زیرا هوش مصنوعی امکانات جدیدی برای تحلیل داده ارائه می‌دهد -- روزنامه‌نگاران باید بتوانند مجموعه داده‌های بزرگ را تفسیر و از تحلیل مبتنی بر هوش مصنوعی استفاده کنند"
        rel:
          - ["Datenkompetenz", "Data Literacy", "تفسیر مجموعه داده‌های بزرگ"]

      - q: "هدف کلی استفاده مستقل از هوش مصنوعی چیست؟"
        a: "کیفیت تضمین‌شده، منابع محافظت‌شده، فرآیندهای روشن، استفاده مستقل از هوش مصنوعی و اعتماد بلندمدت خوانندگان -- نه تولید بیشتر به هر قیمتی"
        rel:
          - ["Souveraener KI-Einsatz", "کیفیت و اعتماد به جای حداکثر تولید"]
