version: 1
number: 9
title: "کنترل کیفیت و ممیزی"
description: "تضمین کیفیت سیستماتیک برای روزنامه‌نگاری مبتنی بر هوش مصنوعی"
sections:
  - title: "اصل انسان در حلقه"
    explanation: |
      اصل بنیادی این است: **روزنامه‌نگاری فعالیتی انسان‌محور است.**
      هوش مصنوعی می‌تواند پشتیبانی کند، اما نمی‌تواند قضاوت، خلاقیت و
      پاسخگویی را که روزنامه‌نگاری کیفی را تعریف می‌کنند جایگزین کند.

      **اجرا در عمل:**
      - هر محتوای تولیدشده توسط هوش مصنوعی قبل از انتشار توسط ویراستاران انسانی بازبینی می‌شود
      - اصل چهار چشم برای محتوای تولیدشده توسط هوش مصنوعی
      - خروجی هوش مصنوعی مانند مواد خبرگزاری رفتار می‌شود: ماده خام که باید ویرایش شود
      - ویراستاران انسانی همیشه حرف آخر را می‌زنند

      حدود **۹۰٪ دستورالعمل‌های بررسی‌شده** (از تحلیل ۴۵ سازمان خبری)
      مقرر می‌کنند که استفاده از هوش مصنوعی در یک خبر باید افشا شود.
    examples:
      - q: "انسان در حلقه در روزنامه‌نگاری چه معنایی دارد؟"
        a: "اینکه هر محتوای تولیدشده توسط هوش مصنوعی قبل از انتشار توسط ویراستاران انسانی بازبینی و تأیید می‌شود -- انسان‌ها همیشه حرف آخر را می‌زنند"
        rel:
          - ["Human-in-the-Loop", "بازبینی انسانی هر خروجی هوش مصنوعی"]

      - q: "چند درصد دستورالعمل‌های تحریریه افشای استفاده از هوش مصنوعی را الزامی می‌کنند؟"
        a: "حدود ۹۰٪ -- بر اساس تحلیل دستورالعمل‌های ۴۵ سازمان خبری"
        rel:
          - ["KI-Offenlegung", "۹۰٪ دستورالعمل‌ها شفافیت را الزامی می‌کنند"]

      - q: "در کار روزانه تحریریه با خروجی هوش مصنوعی چگونه باید رفتار شود؟"
        a: "مانند مواد خبرگزاری -- به عنوان ماده خام که نیاز به ویرایش انسانی، راستی‌آزمایی و بازبینی تحریریه دارد"
        rel:
          - ["KI-Output als Rohmaterial", "رفتار مانند گزارش‌های خبرگزاری"]

      - q: "AP چه اصلی را در استفاده از هوش مصنوعی دنبال می‌کند؟"
        a: "هوش مصنوعی نباید برای ایجاد محتوا و تصاویر قابل انتشار برای سرویس خبری استفاده شود -- فقط برای پشتیبانی داخلی"
        rel:
          - ["AP-Grundsatz", "بدون محتوای تولیدشده توسط هوش مصنوعی در سرویس خبری"]

  - title: "چک‌لیست تضمین کیفیت"
    explanation: |
      هر محتوای مبتنی بر هوش مصنوعی باید این مراحل بازبینی را طی کند:

      ۱. **راستی‌آزمایی**: تأیید همه ادعاهای تولیدشده توسط هوش مصنوعی در مقابل منابع اصلی
      ۲. **تأیید منبع**: آیا منابع نام‌برده واقعی و به درستی نقل‌قول شده‌اند؟
      ۳. **بررسی سوگیری**: شناسایی بازنمایی‌های یک‌طرفه یا انحرافات سیستماتیک
      ۴. **لحن**: آیا سبک استانداردهای تحریریه را رعایت می‌کند؟
      ۵. **برچسب‌گذاری**: افشای استفاده از هوش مصنوعی مطابق دستورالعمل‌های داخلی
      ۶. **نسخه‌بندی**: مستندسازی پرامپت‌ها و ابزارهای هوش مصنوعی استفاده‌شده

      تضمین کیفیت با هوش مصنوعی کم‌اهمیت‌تر نمی‌شود، بلکه **مهم‌تر**.
    examples:
      - q: "مهم‌ترین گام در تضمین کیفیت محتوای هوش مصنوعی چیست؟"
        a: "راستی‌آزمایی -- همه ادعاهای تولیدشده توسط هوش مصنوعی باید در مقابل منابع اصلی تأیید شوند، زیرا هوش مصنوعی می‌تواند توهمات تولید کند"
        rel:
          - ["Faktencheck", "تأیید همه ادعاهای هوش مصنوعی در مقابل منابع اصلی"]

      - q: "چرا تأیید منبع برای متون هوش مصنوعی به‌ویژه مهم است؟"
        a: "زیرا هوش مصنوعی اغلب منابع ناموجود اختراع یا منابع را نادرست نقل‌قول می‌کند -- هر منبع نام‌برده باید از نظر وجود و بازتولید صحیح بررسی شود"
        rel:
          - ["Quellenverifikation", "بررسی اینکه منابع نام‌برده واقعی و صحیح هستند"]

      - q: "نسخه‌بندی در زمینه روزنامه‌نگاری مبتنی بر هوش مصنوعی چه معنایی دارد؟"
        a: "مستندسازی اینکه کدام پرامپت‌ها و ابزارهای هوش مصنوعی استفاده شده‌اند -- این ردیابی و ممیزی‌های بعدی را ممکن می‌سازد"
        rel:
          - ["Versionierung", "مستندسازی پرامپت‌ها و ابزارهای استفاده‌شده"]

      - q: "چرا تضمین کیفیت با هوش مصنوعی مهم‌تر می‌شود؟"
        a: "زیرا هوش مصنوعی منابع خطای جدیدی معرفی می‌کند (توهمات، سوگیری، سرقت ادبی) که با روش‌های بازبینی سنتی پوشش داده نمی‌شوند"
        rel:
          - ["Erweiterte QA", "منابع خطای جدید نیاز به مراحل بازبینی جدید دارند"]

  - title: "ممیزی هوش مصنوعی در تحریریه‌ها"
    explanation: |
      تنها حدود **۵۰٪ تحریریه‌ها** روی دستورالعمل‌های استفاده از هوش مصنوعی کار می‌کنند --
      ممیزی‌های سیستماتیک استثنا هستند. چک‌لیست ممیزی برای تحریریه‌ها:

      ۱. **فهرست ابزار**: کدام ابزارهای هوش مصنوعی استفاده می‌شوند؟
      ۲. **جریان داده**: چه داده‌هایی به سرویس‌های هوش مصنوعی ارسال می‌شوند؟
      ۳. **کیفیت خروجی**: نتایج هوش مصنوعی چند وقت یک‌بار نیاز به اصلاح دارند؟
      ۴. **انطباق**: آیا دستورالعمل‌های داخلی رعایت می‌شوند؟
      ۵. **شفافیت**: آیا استفاده از هوش مصنوعی به مخاطبان افشا می‌شود؟
      ۶. **حفاظت از داده**: آیا داده‌های شخصی و منابع محافظت می‌شوند؟
      ۷. **بهره‌وری هزینه**: آیا نسبت هزینه-فایده معقول است؟

      هدف **کیفیت قابل ردیابی** است -- صرف‌نظر از اینکه محتوا توسط انسان‌ها
      یا با هوش مصنوعی ایجاد شده باشد.
    examples:
      - q: "چند درصد تحریریه‌ها روی دستورالعمل‌های استفاده از هوش مصنوعی کار می‌کنند؟"
        a: "حدود ۵۰٪ -- از آنها فقط چهار دستورالعمل عمومی، سه داخلی و شش دیگر در مرحله پیش‌نویس دارند (نظرسنجی از ۲۸ تحریریه)"
        rel:
          - ["KI-Richtlinien-Status", "فقط ۵۰٪ روی دستورالعمل‌های رسمی کار می‌کنند"]

      - q: "ممیزی هوش مصنوعی در تحریریه شامل چه چیزی است؟"
        a: "فهرست ابزار، تحلیل جریان داده، کیفیت خروجی، بررسی انطباق، بررسی شفافیت، ارزیابی حفاظت از داده و بهره‌وری هزینه"
        rel:
          - ["KI-Audit", "بررسی سیستماتیک استفاده از هوش مصنوعی در تحریریه‌ها"]

      - q: "چه کسی باید در توسعه دستورالعمل‌های هوش مصنوعی مشارکت کند؟"
        a: "تیم‌های تحریریه، بخش حقوقی و تیم‌های مخاطب -- استفاده از هوش مصنوعی یک موضوع تحریریه است، نه صرفاً فنی"
        rel:
          - ["Richtlinien-Entwicklung", "همکاری بین‌رشته‌ای"]

      - q: "هدف ممیزی‌های هوش مصنوعی چیست؟"
        a: "کیفیت قابل ردیابی -- صرف‌نظر از اینکه محتوا توسط انسان‌ها یا با هوش مصنوعی ایجاد شده باشد"
        rel:
          - ["Nachvollziehbare Qualitaet", "هدف کنترل کیفیت"]
