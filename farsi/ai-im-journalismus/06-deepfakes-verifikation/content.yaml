version: 1
number: 6
title: "دیپ‌فیک و تأیید اصالت"
description: "تشخیص رسانه‌های دستکاری‌شده و ابزارهای تأیید اصالت"
sections:
  - title: "درک دیپ‌فیک"
    explanation: |
      **دیپ‌فیک‌ها** رسانه‌های تولید یا دستکاری‌شده توسط هوش مصنوعی (تصاویر، ویدیوها، صوت) هستند
      که فریبنده واقعی به نظر می‌رسند. اعداد هشداردهنده هستند:

      - حدود **۵۰۰,۰۰۰ ویدیوی دیپ‌فیک** در سال ۲۰۲۳ در شبکه‌های اجتماعی به اشتراک گذاشته شد
      - پیش‌بینی‌ها **تا ۸ میلیون دیپ‌فیک تا ۲۰۲۵** را نشان می‌دهند
      - کمپین همسو با روسیه «عملیات اضافه‌بار» در ۲۰۲۵ بیش از ۸۰ سازمان را با لوگوها و صداهای دستکاری‌شده تقلید کرد
      - فناوری دیپ‌فیک به طور فزاینده برای کمپین‌های اطلاعات نادرست استفاده می‌شود

      برای روزنامه‌نگاران این یعنی: هر تصویر، ویدیو یا صوتی باید بالقوه
      قبل از انتشار تأیید اصالت شود.
    examples:
      - q: "دیپ‌فیک چیست؟"
        a: "رسانه‌ای تولید یا دستکاری‌شده توسط هوش مصنوعی (تصویر، ویدیو، صوت) که فریبنده واقعی به نظر می‌رسد و می‌تواند برای اطلاعات نادرست استفاده شود"
        rel:
          - ["Deepfake", "رسانه تولید یا دستکاری‌شده توسط هوش مصنوعی"]

      - q: "چند ویدیوی دیپ‌فیک در سال ۲۰۲۳ در شبکه‌های اجتماعی به اشتراک گذاشته شد؟"
        a: "حدود ۵۰۰,۰۰۰ -- با پیش‌بینی تا ۸ میلیون تا ۲۰۲۵"
        rel:
          - ["Deepfake-Verbreitung", "تعداد به سرعت رو به رشد رسانه‌های دستکاری‌شده"]

      - q: "عملیات اضافه‌بار چه بود؟"
        a: "کمپین اطلاعات نادرست همسو با روسیه در ۲۰۲۵ که بیش از ۸۰ سازمان را با لوگوهای دستکاری‌شده و صداهای تولیدشده توسط هوش مصنوعی تقلید کرد"
        rel:
          - ["Operation Overload", "اطلاعات نادرست دولتی با دستکاری هوش مصنوعی"]

      - q: "چرا دیپ‌فیک‌ها خطر ویژه‌ای برای روزنامه‌نگاری هستند؟"
        a: "می‌توانند برای انتشار اطلاعات نادرست استفاده شوند و اعتماد به رسانه‌های اصیل را تضعیف کنند -- هر رسانه باید بالقوه تأیید اصالت شود"
        rel:
          - ["Desinformation", "انتشار عمدی اطلاعات نادرست با هوش مصنوعی"]

  - title: "روش‌ها و ابزارهای تشخیص"
    explanation: |
      روزنامه‌نگاران ابزارهای مختلفی برای تشخیص دیپ‌فیک دارند:

      - **InVID/WeVerify**: تأیید ویدیو و تحلیل فراداده، ویژه روزنامه‌نگاران
      - **Hive Moderation**: تشخیص تصویر و ویدیوی تولیدشده توسط هوش مصنوعی
      - **Deepware Scanner**: غربالگری اولیه سریع ویدیوها
      - **Content Credentials (C2PA)**: استاندارد منشأ برای رسانه‌های دیجیتال
      - **DeepFake-o-Meter**: ابزار تشخیص آکادمیک برای تحلیل عمیق

      **روش‌های تشخیص:**
      - فارنزیک بصری: ناسازگاری‌های چهره، حرکات غیرطبیعی چشم، خطاهای همگام‌سازی لب
      - تحلیل صوتی: تغییرات تن صدا، الگوهای غیرطبیعی
      - بررسی سازگاری بین‌وجهی: مقایسه بین صوت و تصویر
    examples:
      - q: "کدام ابزار به‌ویژه برای روزنامه‌نگاران برای تأیید ویدیو مناسب است؟"
        a: "InVID/WeVerify -- تأیید ویدیو و تحلیل فراداده ارائه می‌دهد و ویژه روزنامه‌نگاران و راستی‌آزمایان توسعه یافته"
        rel:
          - ["InVID/WeVerify", "ابزار تأیید ویدیو برای روزنامه‌نگاران"]

      - q: "C2PA / Content Credentials چیست؟"
        a: "استاندارد منشأ که ردیابی خاستگاه رسانه‌های دیجیتال را ممکن می‌سازد -- مستند می‌کند آیا و چگونه یک رسانه ویرایش یا توسط هوش مصنوعی تولید شده"
        rel:
          - ["C2PA", "Content Credentials", "استاندارد منشأ برای رسانه‌های دیجیتال"]

      - q: "چگونه می‌توان تصاویر تولیدشده توسط هوش مصنوعی را بصری تشخیص داد؟"
        a: "با آرتیفکت‌هایی مانند دست‌های غیرطبیعی، متن تحریف‌شده، سایه‌های ناسازگار، خطاهای همگام‌سازی لب یا پوست بیش از حد کامل"
        rel:
          - ["Visuelle Forensik", "تشخیص آرتیفکت‌های هوش مصنوعی در تصاویر"]

      - q: "محدودیت ابزارهای تشخیص دیپ‌فیک چیست؟"
        a: "روزنامه‌نگاران گاهی بیش از حد به ابزارها اتکا می‌کنند -- مطالعه‌ای نشان داد که ابزارهای تشخیص به‌ویژه وقتی نتایجشان حدس خود فرد را تأیید می‌کند بیش‌ارزش‌گذاری می‌شوند"
        rel:
          - ["Confirmation Bias", "اعتماد بیش از حد به ابزارهای تأییدکننده"]

  - title: "گردش‌کار تأیید اصالت"
    explanation: |
      گردش‌کار ۶ مرحله‌ای پیشنهادی برای تأیید اصالت:

      ۱. **غربالگری اولیه**: تحلیل خودکار با ابزارهای تشخیص (مثلاً Deepware Scanner)
      ۲. **بررسی فراداده**: بررسی داده‌های EXIF، ویژگی‌های فایل، اعتبارنامه‌های C2PA
      ۳. **بازرسی بصری**: بررسی دستی آرتیفکت‌ها و ناسازگاری‌ها
      ۴. **تأیید منبع**: ردیابی به مبدأ، جستجوی معکوس تصویر، بررسی متقابل
      ۵. **مشاوره با متخصص**: در صورت تردید متخصصان فارنزیک را مشارکت دهید
      ۶. **تصمیم تحریریه**: بازبینان انسانی یافته‌ها را تأیید می‌کنند

      روش‌های کلاسیک مانند **جستجوی معکوس تصویر** (گوگل، TinEye، Yandex) و
      **تأیید جغرافیایی** همچنان ضروری هستند، به‌ویژه برای محتوای تولیدشده توسط کاربر.
    examples:
      - q: "اولین گام در گردش‌کار تأیید اصالت چیست؟"
        a: "غربالگری اولیه خودکار با ابزارهای تشخیص مانند Deepware Scanner -- این در زمان صرفه‌جویی می‌کند و دستکاری‌های آشکار را شناسایی می‌کند"
        rel:
          - ["Erstscreening", "اولین بررسی خودکار با ابزارهای تشخیص"]

      - q: "جستجوی معکوس تصویر چیست؟"
        a: "جستجویی که در آن تصویری آپلود می‌کنید و زمینه اصلی یا تصاویر مشابه را جستجو می‌کنید -- مثلاً از طریق گوگل، TinEye یا Yandex"
        rel:
          - ["Reverse Image Search", "جستجوی معکوس تصویر برای تأیید منبع"]

      - q: "تأیید جغرافیایی چیست؟"
        a: "تعیین مکان ضبط یک تصویر یا ویدیو بر اساس سرنخ‌های بصری مانند تابلوهای خیابان، ساختمان‌ها، پوشش گیاهی و داده‌های جغرافیایی"
        rel:
          - ["Geoverifikation", "تعیین مکان ضبط"]
          - ["OSINT", "Open Source Intelligence"]

      - q: "چرا تأیید محتوای تولیدشده توسط کاربر به‌ویژه مهم است؟"
        a: "زیرا تصاویر و ویدیوهای شبکه‌های اجتماعی اغلب بدون زمینه به اشتراک گذاشته، از نظر زمانی نادرست دسته‌بندی یا عمداً دستکاری می‌شوند"
        rel:
          - ["UGC-Verifikation", "تأیید محتوای تولیدشده توسط کاربر"]
