version: 1
number: 4
title: "مهندسی پرامپت برای روزنامه‌نگاران"
description: "هنر دادن دستورالعمل‌های دقیق به سیستم‌های هوش مصنوعی"
sections:
  - title: "مبانی مهندسی پرامپت"
    explanation: |
      کیفیت خروجی هوش مصنوعی به شدت به **پرامپت** بستگی دارد -- دستورالعملی که به سیستم هوش مصنوعی داده می‌شود.
      مهندسی پرامپت در ۲۰۲۵ دیگر فقط پرسیدن سوال نیست، بلکه طراحی انواع سوالاتی است
      که مدل‌های هوش مصنوعی را به خروجی‌های دقیق، مرتبط و قابل اجرا هدایت می‌کند.

      **پنج تکنیک مهم:**
      - **پرامپت بدون نمونه (Zero-Shot)**: وظیفه مستقیم بدون مثال
      - **پرامپت با نمونه (Few-Shot)**: وظیفه با مثال‌هایی برای سبک مورد نظر
      - **زنجیره تفکر (Chain-of-Thought)**: وادار کردن به استدلال گام‌به‌گام
      - **پرامپت نقشی (Role Prompting)**: اختصاص نقش به هوش مصنوعی
      - **زنجیره پرامپت (Prompt Chaining)**: پیوند چندین پرامپت (تحقیق -> خلاصه -> پیش‌نویس)
    examples:
      - q: "پرامپت چیست؟"
        a: "دستورالعمل متنی به سیستم هوش مصنوعی که توضیح می‌دهد چه کاری باید انجام دهد -- هرچه پرامپت دقیق‌تر باشد، نتیجه بهتر است"
        rel:
          - ["Prompt", "دستورالعمل به سیستم هوش مصنوعی"]
          - ["Prompt Engineering", "هنر نوشتن پرامپت‌های خوب"]

      - q: "تفاوت بین پرامپت بدون نمونه و با نمونه چیست؟"
        a: "بدون نمونه وظیفه را مستقیماً بدون مثال می‌دهد. با نمونه مثال‌هایی برای سبک یا فرمت مورد نظر ارائه می‌دهد"
        rel:
          - ["Zero-Shot", "وظیفه مستقیم بدون مثال"]
          - ["Few-Shot", "وظیفه با مثال‌هایی برای خروجی مورد نظر"]

      - q: "پرامپت زنجیره تفکر چیست؟"
        a: "تکنیکی که در آن از هوش مصنوعی می‌خواهید گام‌به‌گام فکر کند -- مثلاً 'این آمار را گام‌به‌گام تحلیل کن و ناسازگاری‌ها را بررسی کن'"
        rel:
          - ["Chain-of-Thought", "وادار کردن به استدلال گام‌به‌گام"]

      - q: "زنجیره پرامپت چه معنایی دارد؟"
        a: "پیوند چندین پرامپت به یک گردش‌کار -- مثلاً ابتدا تحقیق، سپس خلاصه، سپس راستی‌آزمایی، سپس پیش‌نویس متن"
        rel:
          - ["Prompt Chaining", "پیوند چندین پرامپت به یک گردش‌کار"]

  - title: "بهترین شیوه‌ها برای کار روزانه تحریریه"
    explanation: |
      **دقیق باشید:**
      بد: "مقاله‌ای درباره تغییرات اقلیمی بنویس"
      بهتر: "یک گزارش خبری ۳۰۰ کلمه‌ای درباره نتایج COP29 برای مخاطبان منطقه‌ای آلمان بنویس.
      تمرکز بر تصمیمات مشخص مرتبط با سیاست اقلیمی محلی.
      سبک: واقعی-اطلاعاتی، بدون اظهارنظر."

      **زمینه ارائه دهید:**
      اطلاعات پس‌زمینه، مخاطب هدف و حقایق موجود را وارد کنید.

      **فرمت مشخص کنید:**
      طول، سبک، ساختار و محدودیت‌ها را تعریف کنید.

      **تکراری کار کنید:**
      پرامپت‌ها را تست کنید، نتایج را ارزیابی کنید، ورودی را اصلاح کنید، الگوها بسازید.
    examples:
      - q: "اشتباه رایج در پرامپت‌نویسی چیست؟"
        a: "دستورالعمل‌های بسیار مبهم بدون زمینه، مخاطب هدف یا مشخصات فرمت -- مثلاً 'مقاله‌ای درباره تغییرات اقلیمی بنویس' به جای توصیف دقیق وظیفه"
        rel:
          - ["Vage Prompts", "رایج‌ترین اشتباه -- زمینه و مشخصات خیلی کم"]

      - q: "چرا باید در پرامپت نقش تعریف کرد؟"
        a: "زیرا هوش مصنوعی لحن، اصطلاحات تخصصی و دیدگاه را بر اساس آن تنظیم می‌کند -- مثلاً 'تو یک روزنامه‌نگار باتجربه اقتصادی هستی'"
        rel:
          - ["Role Prompting", "اختصاص نقش به هوش مصنوعی برای نتایج بهتر"]

      - q: "یک پرامپت روزنامه‌نگاری خوب باید شامل چه چیزی باشد؟"
        a: "نقش، زمینه، وظیفه، مخاطب هدف، فرمت، طول و محدودیت‌ها -- مثلاً 'فقط از حقایق زیر استفاده کن'"
        rel:
          - ["Prompt-Struktur", "نقش + زمینه + وظیفه + فرمت + محدودیت‌ها"]

      - q: "چرا کار تکراری در پرامپت‌نویسی مهم است؟"
        a: "زیرا به ندرت اولین پرامپت نتیجه کامل می‌دهد -- از طریق تست، ارزیابی و اصلاح به تدریج کیفیت بهبود می‌یابد"
        rel:
          - ["Iteratives Prompting", "اصلاح تدریجی پرامپت‌ها"]

  - title: "الگوهای پرامپت ویژه روزنامه‌نگاری"
    explanation: |
      الگوهای قابل استفاده مجدد در زمان صرفه‌جویی و کیفیت را تضمین می‌کنند:

      **پرامپت راستی‌آزمایی:**
      "ادعاهای زیر را از نظر معقول بودن بررسی کن. برای هرکدام فهرست کن:
      (۱) ادعا، (۲) حقایق شناخته‌شده له/علیه، (۳) منابع احتمالی
      برای تأیید، (۴) ارزیابی اطمینان."

      **پرامپت تحقیقاتی:**
      "یک طرح تحقیقاتی درباره موضوع [X] بساز. شناسایی کن: (۱) سوالات کلیدی،
      (۲) متخصصان و مؤسسات مرتبط، (۳) منابع داده احتمالی،
      (۴) دیدگاه‌های جایگزین که باید در نظر گرفته شوند."

      **پرامپت خلاصه‌سازی:**
      "بر اساس گزارش زیر، خلاصه‌ای با ۵ نکته مهم‌ترین بساز.
      بخش‌هایی که نیاز به تأیید دارند را مشخص کن."
    examples:
      - q: "چرا الگوهای پرامپت قابل استفاده مجدد مفید هستند؟"
        a: "در کارهای تکراری زمان صرفه‌جویی می‌کنند، کیفیت یکنواخت تضمین می‌کنند و می‌توان آنها را در تیم به اشتراک گذاشت"
        rel:
          - ["Prompt-Templates", "الگوهای قابل استفاده مجدد برای دستورالعمل‌های هوش مصنوعی"]

      - q: "چگونه یک پرامپت راستی‌آزمایی خوب بنویسیم؟"
        a: "ادعاها را فهرست کنید، برای هرکدام حقایق شناخته‌شده له/علیه بیاورید، منابع تأیید پیشنهاد دهید و ارزیابی اطمینان بدهید"
        rel:
          - ["Faktencheck-Prompt", "الگو برای راستی‌آزمایی مبتنی بر هوش مصنوعی"]

      - q: "چه محدودیتی باید همیشه برای پیش‌نویس متن تنظیم شود؟"
        a: "'نقل‌قول مستقیم اختراع نکن، فقط از موجود استفاده کن' و 'بخش‌هایی که نیاز به تأیید مستقل دارند را مشخص کن'"
        rel:
          - ["Einschraenkungen", "تعیین محدودیت‌ها از توهمات جلوگیری می‌کند"]

      - q: "چگونه می‌توان پرامپت‌های هوش مصنوعی را در تیم استاندارد کرد؟"
        a: "از طریق کتابخانه پرامپت مشترک با الگوهای تست‌شده برای کارهای مختلف مانند تحقیق، خلاصه‌سازی، ترجمه و راستی‌آزمایی"
        rel:
          - ["Prompt-Bibliothek", "مجموعه مشترک الگوهای پرامپت تست‌شده"]
