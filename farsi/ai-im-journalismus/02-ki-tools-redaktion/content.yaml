version: 1
number: 2
title: "ابزارهای هوش مصنوعی در تحریریه"
description: "کدام ابزارهای هوش مصنوعی را تحریریه‌ها عملاً استفاده می‌کنند"
sections:
  - title: "مدل‌های زبانی بزرگ (LLM)"
    explanation: |
      مدل‌های زبانی بزرگ پایه بسیاری از کاربردهای هوش مصنوعی در روزنامه‌نگاری هستند:

      - **ChatGPT (OpenAI)**: خلاصه‌سازی متن، پشتیبانی تحقیقاتی، ایده‌پردازی، تحلیل داده
      - **Claude (Anthropic)**: پنجره‌های متنی بلند برای تحلیل اسناد، کار متنی دقیق
      - **Perplexity AI**: تحقیق وب بلادرنگ با ذکر منبع، حالت تحقیق عمیق
      - **Google Gemini**: یکپارچگی با اکوسیستم گوگل، قابلیت‌های چندوجهی

      OpenAI در سال ۲۰۲۵ «آکادمی OpenAI برای سازمان‌های خبری» را تأسیس کرد -- برنامه‌ای
      با کمک‌های مالی، پشتیبانی فنی و دسترسی به جدیدترین مدل‌ها.
    examples:
      - q: "مدل زبانی بزرگ (LLM) چیست؟"
        a: "یک مدل هوش مصنوعی که بر روی حجم عظیمی از متن آموزش دیده و می‌تواند زبان را درک و تولید کند -- نمونه‌ها شامل ChatGPT، Claude و Gemini هستند"
        rel:
          - ["LLM", "Large Language Model", "مدل زبانی بزرگ"]

      - q: "کدام ابزار هوش مصنوعی به‌ویژه برای تحلیل اسناد طولانی مناسب است؟"
        a: "Claude از Anthropic -- پنجره‌های متنی بسیار بلندی ارائه می‌دهد و برای تحلیل اسناد گسترده مناسب است"
        rel:
          - ["Claude", "Anthropic", "پنجره‌های متنی بلند برای تحلیل اسناد"]

      - q: "چه تفاوتی بین Perplexity AI و ChatGPT وجود دارد؟"
        a: "Perplexity پاسخ‌هایی با ذکر منبع ارائه می‌دهد و حالت تحقیق عمیق برای تحقیق قابل تأیید دارد -- ChatGPT به طور پیش‌فرض منابع را لینک نمی‌کند"
        rel:
          - ["Perplexity AI", "موتور جستجوی هوش مصنوعی با ذکر منبع"]

      - q: "آکادمی OpenAI برای سازمان‌های خبری چیست؟"
        a: "برنامه‌ای که در سال ۲۰۲۵ توسط OpenAI با کمک‌های مالی، پشتیبانی فنی و دسترسی به جدیدترین مدل‌ها برای تحریریه‌ها تأسیس شد"
        rel:
          - ["OpenAI Academy", "برنامه حمایتی برای سازمان‌های خبری"]

  - title: "رونویسی و ترجمه"
    explanation: |
      **۷۹٪ از تحریریه‌ها** از رونویسی خودکار برای مصاحبه‌ها استفاده می‌کنند. ابزارهای کلیدی:

      - **Trint**: بیش از ۵۰ زبان، سازگار با GDPR، با داده‌های کاربر آموزش نمی‌بیند -- استاندارد در AFP و گاردین
      - **Otter.ai**: شرکت خودکار در جلسات و خلاصه‌سازی (نگرانی‌های حریم خصوصی -- گاردین استفاده از آن را ممنوع کرده)
      - **OpenAI Whisper**: مدل متن‌باز با ۶۸۰,۰۰۰ ساعت داده آموزشی، پایه بسیاری از ابزارهای دیگر
      - **DeepL / DeepL Write**: ترجمه و بهینه‌سازی متن، به‌ویژه قوی برای آلمانی

      **مهم:** Trint سیاست «عدم آموزش» و انتخاب بین ذخیره‌سازی داده در اتحادیه اروپا و
      آمریکا را ارائه می‌دهد -- یک مزیت تعیین‌کننده برای حفاظت از منابع.
    examples:
      - q: "چند درصد از تحریریه‌ها از رونویسی خودکار استفاده می‌کنند؟"
        a: "۷۹٪ از تحریریه‌ها از رونویسی خودکار برای مصاحبه‌ها استفاده می‌کنند"
        rel:
          - ["Automatisierte Transkription", "رایج‌ترین استفاده از هوش مصنوعی در تحریریه‌ها"]

      - q: "چرا گاردین استفاده از Otter.ai را ممنوع کرده است؟"
        a: "به دلیل نگرانی‌های حریم خصوصی -- Otter.ai داده‌ها را ذخیره می‌کند و مشخص نیست آیا برای آموزش مدل استفاده می‌شوند"
        rel:
          - ["Datenschutzbedenken", "خطر ابزارهای رونویسی مبتنی بر ابر"]

      - q: "چه چیزی Trint را برای تحریریه‌های اروپایی مناسب می‌کند؟"
        a: "سیاست عدم آموزش و انتخاب بین ذخیره‌سازی داده در اتحادیه اروپا و آمریکا -- که آن را سازگار با GDPR می‌کند و از منابع محافظت می‌کند"
        rel:
          - ["Trint", "رونویسی سازگار با GDPR با سیاست عدم آموزش"]
          - ["DSGVO", "مقررات عمومی حفاظت از داده‌های اتحادیه اروپا"]

      - q: "OpenAI Whisper چیست؟"
        a: "یک مدل تشخیص گفتار متن‌باز با ۶۸۰,۰۰۰ ساعت داده آموزشی -- پایه بسیاری از ابزارهای رونویسی دیگر"
        rel:
          - ["Whisper", "تشخیص گفتار متن‌باز از OpenAI"]

  - title: "ابزارهای تخصصی روزنامه‌نگاری"
    explanation: |
      علاوه بر ابزارهای عمومی هوش مصنوعی، ابزارهایی وجود دارند که به‌طور خاص برای روزنامه‌نگاری توسعه یافته‌اند:

      - **Google Pinpoint**: رایگان، تا ۲۰۰,۰۰۰ سند را تحلیل می‌کند، افراد/مکان‌ها/سازمان‌ها را شناسایی می‌کند، صوت/تصویر را رونویسی می‌کند -- بوستون‌گلوب با آن جایزه پولیتزر برد
      - **dpa News Hub**: دستیار تحقیقاتی هوش مصنوعی که فقط به منابع تأیید شده دی‌پی‌ای دسترسی دارد
      - **Djinn (نروژ)**: هزاران سند شهرداری را برای گزارش‌دهی محلی جستجو می‌کند
      - **LocalLens**: جلسات دولت محلی را رونویسی و خلاصه می‌کند
      - **Dataminr**: تشخیص بلادرنگ رویدادها و اخبار فوری قبل از ویروسی شدن
      - **Rolli Information Tracer**: انتشار اطلاعات را در پلتفرم‌های مختلف ردیابی می‌کند
    examples:
      - q: "Google Pinpoint چیست و چه کاری می‌تواند انجام دهد؟"
        a: "یک ابزار رایگان تحلیل اسناد برای روزنامه‌نگاران -- به‌طور خودکار افراد، سازمان‌ها و مکان‌ها را در تا ۲۰۰,۰۰۰ سند شناسایی و صوت/تصویر را رونویسی می‌کند"
        rel:
          - ["Google Pinpoint", "ابزار رایگان تحلیل اسناد"]

      - q: "کدام تحقیق تحقیقاتی با Google Pinpoint پشتیبانی شد؟"
        a: "تحقیق برنده جایزه پولیتزر بوستون‌گلوب (۲۰۲۱). ماریا رسا ۱۳,۰۰۰ سند سیا را در ۳۰ دقیقه پردازش کرد"
        rel:
          - ["Pulitzer-Preis", "تحقیق برنده جایزه با پشتیبانی هوش مصنوعی"]

      - q: "چه چیزی Dataminr را برای تحریریه‌های خبری ارزشمند می‌کند؟"
        a: "رویدادها و روندها را در لحظه تشخیص می‌دهد و اخبار فوری را قبل از ویروسی شدن کشف می‌کند"
        rel:
          - ["Dataminr", "تشخیص بلادرنگ رویدادها و روندها"]

      - q: "Rolli Information Tracer چیست؟"
        a: "ابزاری که انتشار اطلاعات را در پلتفرم‌های مختلف ردیابی می‌کند، منشأ ادعاها را شناسایی می‌کند و نشان می‌دهد محتوا هنگام اشتراک‌گذاری چگونه تغییر می‌کند"
        rel:
          - ["Information Tracer", "ردیابی انتشار اطلاعات در پلتفرم‌ها"]

  - title: "ابزارهای راستی‌آزمایی"
    explanation: |
      ابزارهای اختصاصی هوش مصنوعی از روزنامه‌نگاران در راستی‌آزمایی پشتیبانی می‌کنند:

      - **Full Fact AI**: صوت/تصویر را رونویسی می‌کند با تشخیص بلادرنگ اطلاعات نادرست، توسط بیش از ۴۵ سازمان در ۳۰ کشور استفاده می‌شود
      - **ClaimBuster**: سخنرانی‌ها و مناظره‌های سیاسی را تحلیل می‌کند، به‌طور خودکار ادعاهای قابل بررسی را استخراج می‌کند (Duke Reporter's Lab)
      - **Logically Facts**: راستی‌آزمایی حرفه‌ای با اولویت‌بندی مبتنی بر هوش مصنوعی

      **مهم:** این ابزارها از راستی‌آزمایی پشتیبانی می‌کنند -- ارزیابی نهایی همیشه
      با انسان باقی می‌ماند.
    examples:
      - q: "Full Fact AI چیست و چقدر گسترده است؟"
        a: "ابزاری که صوت/تصویر را رونویسی و اطلاعات نادرست را در لحظه تشخیص می‌دهد -- توسط بیش از ۴۵ سازمان در ۳۰ کشور استفاده می‌شود"
        rel:
          - ["Full Fact AI", "راستی‌آزمایی بلادرنگ مبتنی بر هوش مصنوعی"]

      - q: "ClaimBuster چیست؟"
        a: "ابزاری که در Duke Reporter's Lab توسعه یافته و به‌طور خودکار ادعاهای قابل بررسی را در سخنرانی‌ها و مناظره‌های سیاسی شناسایی می‌کند"
        rel:
          - ["ClaimBuster", "تشخیص خودکار ادعاهای قابل بررسی"]

      - q: "آیا ابزارهای هوش مصنوعی می‌توانند راستی‌آزمایی را کاملاً بر عهده بگیرند؟"
        a: "خیر -- ابزارهای هوش مصنوعی می‌توانند سرنخ بدهند و ادعاها را شناسایی کنند، اما ارزیابی نهایی همیشه باید توسط یک روزنامه‌نگار انجام شود (انسان در حلقه)"
        rel:
          - ["Human-in-the-Loop", "انسان تصمیم نهایی را در راستی‌آزمایی می‌گیرد"]
