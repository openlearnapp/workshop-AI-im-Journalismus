version: 1
number: 8
title: "اخلاق، حقوق و مقررات"
description: "چارچوب حقوقی و دستورالعمل‌های اخلاقی برای هوش مصنوعی در روزنامه‌نگاری"
sections:
  - title: "قانون هوش مصنوعی اتحادیه اروپا"
    explanation: |
      مقررات هوش مصنوعی اتحادیه اروپا (مقررات 2024/1689) در ۱ اوت ۲۰۲۴ لازم‌الاجرا شد --
      اولین قانون جامع هوش مصنوعی در جهان.

      **مقررات مربوطه:**
      - رسانه‌ها به عنوان حوزه پرخطر طبقه‌بندی **نشده‌اند**
      - **ماده ۵۰**: محتوای تولیدشده توسط هوش مصنوعی باید به فرمت قابل خواندن ماشین برچسب‌گذاری شود
      - دیپ‌فیک‌ها و متون تولیدشده توسط هوش مصنوعی درباره موضوعات منفعت عمومی باید به وضوح برچسب‌گذاری شوند
      - شرکت‌ها باید افشا کنند چه محتوایی برای آموزش استفاده شده

      **جدول زمانی:** الزامات شفافیت در **۲ اوت ۲۰۲۶** قابل اجرا می‌شوند.

      انتقاد: خبرنگاران بدون مرز (RSF) هشدار می‌دهد که مدل کسب‌وکار رسانه‌های مستقل
      با نقض حق نشر بیشتر به خطر می‌افتد.
    examples:
      - q: "قانون هوش مصنوعی اتحادیه اروپا چیست؟"
        a: "مقررات هوش مصنوعی اتحادیه اروپا (لازم‌الاجرا از اوت ۲۰۲۴) -- اولین قانون جامع هوش مصنوعی جهان با الزامات شفافیت و برچسب‌گذاری"
        rel:
          - ["EU AI Act", "مقررات هوش مصنوعی اروپا، مقررات 2024/1689"]

      - q: "آیا متون روزنامه‌نگاری تولیدشده توسط هوش مصنوعی طبق قانون هوش مصنوعی اتحادیه اروپا باید برچسب‌گذاری شوند؟"
        a: "بله -- از اوت ۲۰۲۶ متون تولیدشده توسط هوش مصنوعی درباره موضوعات منفعت عمومی باید افشا شوند (ماده ۵۰)"
        rel:
          - ["Artikel 50", "الزام برچسب‌گذاری برای محتوای تولیدشده توسط هوش مصنوعی"]

      - q: "آیا روزنامه‌نگاری به عنوان حوزه پرخطر طبقه‌بندی شده؟"
        a: "خیر -- رسانه‌ها در حال حاضر به عنوان حوزه پرخطر طبقه‌بندی نشده‌اند، بنابراین سخت‌ترین مقررات مستقیماً اعمال نمی‌شوند"
        rel:
          - ["Risikoklassifikation", "رسانه‌ها حوزه پرخطر در قانون هوش مصنوعی نیستند"]

      - q: "خبرنگاران بدون مرز (RSF) چه انتقادی از قانون هوش مصنوعی اتحادیه اروپا دارد؟"
        a: "RSF هشدار می‌دهد که مدل کسب‌وکار شکننده رسانه‌های مستقل با نقض حق نشر و استفاده از هوش مصنوعی مولد بیشتر به خطر می‌افتد"
        rel:
          - ["RSF-Kritik", "به خطر افتادن رسانه‌های مستقل توسط هوش مصنوعی"]

  - title: "کدکس مطبوعاتی آلمان و مقررات"
    explanation: |
      در آلمان چندین سطح نظارتی وجود دارد:

      **شورای مطبوعات آلمان (از مارس ۲۰۲۵):**
      - اصلاحیه مقدمه: تحریریه‌ها مسئولیت اخلاق مطبوعاتی را برای محتوای تولیدشده توسط هوش مصنوعی نیز بر عهده دارند
      - **بدون** الزام برچسب‌گذاری برای متون هوش مصنوعی
      - **الزام برچسب‌گذاری برای تصاویر هوش مصنوعی** به عنوان تصاویر نمادین
      - کل کدکس مطبوعاتی بدون تغییر برای محتوای هوش مصنوعی نیز اعمال می‌شود

      **مقامات رسانه‌ای ایالتی:**
      - سند موضع‌گیری «هوش مصنوعی و رسانه -- تقویت تنوع، تنظیم مسئولیت، حفظ اعتماد»
      - مسئول نظارت بر هوش مصنوعی در پخش و تله‌مدیا
      - **۹۰٪ پاسخ‌دهندگان** خواهان الزامات برچسب‌گذاری الزام‌آور هستند

      **معاهده دولتی رسانه دیجیتال (پیش‌نویس ژوئن ۲۰۲۵):**
      - الزامات چهار چارچوب نظارتی اتحادیه اروپا را اجرا می‌کند
    examples:
      - q: "آیا متون تولیدشده توسط هوش مصنوعی طبق کدکس مطبوعاتی باید برچسب‌گذاری شوند؟"
        a: "خیر -- شورای مطبوعات آلمان در حال حاضر الزام برچسب‌گذاری اضافی برای متون هوش مصنوعی را ضروری نمی‌داند، اما تصاویر تولیدشده توسط هوش مصنوعی باید به عنوان تصاویر نمادین برچسب‌گذاری شوند"
        rel:
          - ["Pressekodex-KI", "بدون الزام متنی، اما برچسب‌گذاری تصویر"]

      - q: "اصلاحیه مقدمه کدکس مطبوعاتی چه می‌گوید؟"
        a: "تحریریه‌ها مسئولیت اخلاق مطبوعاتی را برای همه مطالب بر عهده دارند -- صرف‌نظر از نحوه تولید، از جمله محتوای تولیدشده توسط هوش مصنوعی"
        rel:
          - ["Presseethische Verantwortung", "برای محتوای تولیدشده توسط هوش مصنوعی نیز اعمال می‌شود"]

      - q: "چه کسی در آلمان مسئول نظارت بر هوش مصنوعی در رسانه‌ها است؟"
        a: "مقامات رسانه‌ای ایالتی -- آنها مسئول نظارت بر کاربردهای هوش مصنوعی در پخش و تله‌مدیا هستند، نه آژانس شبکه فدرال"
        rel:
          - ["Landesmedienanstalten", "نظارت بر هوش مصنوعی در رسانه‌ها"]

      - q: "چند درصد آلمانی‌ها خواهان الزام برچسب‌گذاری محتوای هوش مصنوعی هستند؟"
        a: "۹۰٪ پاسخ‌دهندگان خواهان الزامات برچسب‌گذاری الزام‌آور طبق مطالعه مقامات رسانه‌ای ایالتی هستند"
        rel:
          - ["Oeffentliche Erwartung", "۹۰٪ خواهان الزام برچسب‌گذاری هوش مصنوعی"]

  - title: "حق نشر و دعاوی حقوقی"
    explanation: |
      وضعیت حق نشر برای هوش مصنوعی بسیار متغیر است:

      - تعداد دعاوی در ۲۰۲۵ از ۳۰ به **بیش از ۷۰** بیش از دو برابر شده
      - **NYT در مقابل OpenAI**: NYT به دلیل آموزش با مقالات NYT شکایت کرده (اختلاف استفاده منصفانه، ادامه دارد)
      - **NYT در مقابل Perplexity**: شکایت به دلیل دزدی روزنامه‌نگاری پس از شکست مذاکرات مجوز
      - **Advance در مقابل Cohere**: اولین تصمیم که ادعاهای کپی خروجی را برای خلاصه‌های خبری مجاز می‌داند
      - **اشتراک درآمد Perplexity**: در پاسخ به اتهامات سرقت ادبی، Perplexity اکنون درآمد را با ناشران به اشتراک می‌گذارد (از جمله اشپیگل)

      آثار صرفاً تولیدشده توسط هوش مصنوعی در اکثر کشورها **حمایت حق نشر ندارند**.
    examples:
      - q: "نقطه اصلی اختلاف در NYT در مقابل OpenAI چیست؟"
        a: "آیا آموزش مدل‌های هوش مصنوعی با مقالات NYT استفاده منصفانه است (استدلال OpenAI) یا دزدی سیستماتیک (موضع NYT) -- پرونده ادامه دارد"
        rel:
          - ["NYT vs. OpenAI", "دعوای حقوقی مرکزی حق نشر در حوزه هوش مصنوعی"]
          - ["Fair Use", "استثنای حق نشر آمریکا"]

      - q: "آیا متون تولیدشده توسط هوش مصنوعی حمایت حق نشر دارند؟"
        a: "خیر -- طبق قانون فعلی، آثار صرفاً تولیدشده توسط هوش مصنوعی در اکثر کشورها حمایت حق نشر ندارند"
        rel:
          - ["KI-Urheberrecht", "آثار صرفاً تولیدشده توسط هوش مصنوعی محافظت نمی‌شوند"]

      - q: "مدل اشتراک درآمد Perplexity چیست؟"
        a: "در پاسخ به اتهامات سرقت ادبی، Perplexity اکنون درآمد را با ناشران به اشتراک می‌گذارد -- از جمله اشپیگل، Fortune، Time و Texas Tribune"
        rel:
          - ["Revenue-Sharing", "اشتراک درآمد بین ارائه‌دهنده هوش مصنوعی و ناشران"]

      - q: "تعداد دعاوی حق نشر علیه شرکت‌های هوش مصنوعی چگونه تغییر کرده؟"
        a: "در ۲۰۲۵ بیش از دو برابر شده: از حدود ۳۰ در پایان ۲۰۲۴ به بیش از ۷۰"
        rel:
          - ["Klagewelle", "بیش از دو برابر شدن دعاوی حق نشر هوش مصنوعی در ۲۰۲۵"]
