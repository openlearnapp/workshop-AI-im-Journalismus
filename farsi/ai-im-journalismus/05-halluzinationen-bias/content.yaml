version: 1
number: 5
title: "توهمات و سوگیری"
description: "بزرگ‌ترین خطرات استفاده از هوش مصنوعی در روزنامه‌نگاری"
sections:
  - title: "توهمات هوش مصنوعی"
    explanation: |
      **توهمات** زمانی رخ می‌دهند که هوش مصنوعی اطلاعاتی قانع‌کننده اما واقعاً نادرست تولید می‌کند.
      مشکل جدی است:

      - چت‌بات‌های هوش مصنوعی **نرخ توهم تا ۷۹٪** دارند
      - مطالعه‌ای از مرکز Tow نشان داد که **بیش از ۶۰٪ پاسخ‌های موتورهای جستجوی هوش مصنوعی نادقیق** بودند
      - توهمات شامل: نقل‌قول‌های ساختگی، آمار نادرست، منابع ناموجود

      توهمات به‌ویژه تحت فشار زمانی در گزارش‌دهی بلادرنگ خطرناک هستند،
      زیرا خطاهای قانع‌کننده سخت تشخیص داده می‌شوند.
    examples:
      - q: "توهمات هوش مصنوعی چیست؟"
        a: "زمانی که هوش مصنوعی اطلاعاتی قانع‌کننده اما واقعاً نادرست تولید می‌کند -- مثلاً نقل‌قول‌های ساختگی، آمار نادرست یا منابع ناموجود"
        rel:
          - ["Halluzination", "خروجی‌های قانع‌کننده اما نادرست هوش مصنوعی"]

      - q: "نرخ توهم چت‌بات‌های هوش مصنوعی چقدر است؟"
        a: "تا ۷۹٪ طبق مطالعات فعلی -- و بیش از ۶۰٪ پاسخ‌های موتورهای جستجوی هوش مصنوعی نادقیق هستند (مرکز Tow)"
        rel:
          - ["Halluzinationsrate", "تا ۷۹٪ برای چت‌بات‌های هوش مصنوعی"]

      - q: "چرا توهمات در روزنامه‌نگاری به‌ویژه خطرناک هستند؟"
        a: "زیرا قانع‌کننده به نظر می‌رسند و تحت فشار زمانی سخت تشخیص داده می‌شوند -- حقایق نادرست می‌توانند وارد گزارش‌دهی شوند"
        rel:
          - ["Echtzeit-Berichterstattung", "خطر توهم به‌ویژه بالا تحت فشار زمانی"]

      - q: "در CNET با مقالات تولیدشده توسط هوش مصنوعی چه اتفاقی افتاد؟"
        a: "CNET هفتادوهفت مقاله مالی تولیدشده توسط هوش مصنوعی منتشر کرد -- بیش از نیمی از آنها نیاز به اصلاح داشتند، با خطاهایی از نادقیقی‌های واقعی تا توضیحات اساساً نادرست"
        rel:
          - ["CNET-Skandal", "بیش از ۵۰٪ مقالات هوش مصنوعی نیاز به اصلاح داشتند"]

  - title: "سوگیری و انحرافات"
    explanation: |
      **سوگیری** (انحراف سیستماتیک) از داده‌های آموزشی مدل‌های هوش مصنوعی ناشی می‌شود:

      - داده‌های آموزشی می‌توانند جانبدارانه، نادقیق یا عمداً دستکاری شده باشند
      - بازیگران دولتی و غیردولتی می‌توانند روایت‌هایی را در داده‌های آموزشی تزریق کنند
      - کم‌نمایی سیستماتیک دیدگاه‌ها و گروه‌های جمعیتی خاص
      - تقویت تعصبات اجتماعی موجود

      برای روزنامه‌نگاری این یعنی: هوش مصنوعی می‌تواند بازنمایی‌های یک‌طرفه تولید کند
      بدون اینکه در نگاه اول قابل تشخیص باشد.
    examples:
      - q: "سوگیری در زمینه هوش مصنوعی چه معنایی دارد؟"
        a: "انحرافات سیستماتیک که از داده‌های آموزشی اقتباس شده‌اند -- مثلاً کم‌نمایی دیدگاه‌های خاص یا تقویت تعصبات اجتماعی"
        rel:
          - ["Bias", "انحراف سیستماتیک در سیستم‌های هوش مصنوعی"]

      - q: "سوگیری‌های هوش مصنوعی چگونه می‌توانند بر روزنامه‌نگاری تأثیر بگذارند؟"
        a: "هوش مصنوعی می‌تواند بازنمایی‌های یک‌طرفه تولید کند، دیدگاه‌های خاصی را ترجیح دهد یا گروه‌های جمعیتی را کم‌نمایی کند -- بدون اینکه فوراً قابل تشخیص باشد"
        rel:
          - ["Journalistischer Bias", "هوش مصنوعی می‌تواند گزارش‌دهی یک‌طرفه را تقویت کند"]

      - q: "آیا داده‌های آموزشی می‌توانند عمداً دستکاری شوند؟"
        a: "بله -- بازیگران دولتی و غیردولتی می‌توانند روایت‌هایی را در داده‌های آموزشی تزریق کنند تا خروجی‌های هوش مصنوعی را به نفع خود تأثیر بگذارند"
        rel:
          - ["Datenmanipulation", "دستکاری عمدی داده‌های آموزشی هوش مصنوعی"]

      - q: "چگونه می‌توان سوگیری در خروجی‌های هوش مصنوعی را تشخیص داد؟"
        a: "از طریق بررسی تنوع نتایج، مقایسه با منابع جایگزین، آموزش حساسیت برای ویراستاران و تحلیل‌های سیستماتیک سوگیری"
        rel:
          - ["Bias-Analyse", "بررسی سیستماتیک انحرافات"]
          - ["Diversitaetspruefung", "بررسی اینکه آیا همه دیدگاه‌های مرتبط نمایندگی دارند"]

  - title: "مطالعات موردی: وقتی هوش مصنوعی اشتباه می‌کند"
    explanation: |
      موارد واقعی خطرات را نشان می‌دهند:

      - **Sports Illustrated (۲۰۲۳)**: مقالات با نام‌های نویسنده ساختگی با بیوگرافی‌های تولیدشده توسط هوش مصنوعی -- اعضای تیم اختراعی مانند «Drew Ortiz» و «Sora Tanaka»
      - **Gannett/USA Today**: گزارش‌های ورزشی تولیدشده توسط هوش مصنوعی با عبارات نامعقول مانند "close encounter of the athletic kind"
      - **Google AI Overviews (۲۰۲۴)**: توصیه به خوردن سنگ و زدن چسب روی پیتزا (پست‌های طنز انجمن را به عنوان حقیقت پذیرفت)
      - **Perplexity AI (۲۰۲۴)**: سرقت ادبی سیستماتیک از محتوای انحصاری محافظت‌شده با پی‌وال از فوربز و وایرد

      همه موارد نشان می‌دهند: بدون نظارت انسانی، خطاهایی پدید می‌آیند که اعتماد خوانندگان را نابود می‌کنند.
    examples:
      - q: "در رسوایی هوش مصنوعی Sports Illustrated چه اتفاقی افتاد؟"
        a: "Sports Illustrated مقالاتی با نام‌های نویسنده ساختگی با بیوگرافی‌ها و تخصص‌های کاملاً تولیدشده توسط هوش مصنوعی منتشر کرد -- راهنماهای خرید هوش مصنوعی از طریق لینک‌های وابسته درآمدزایی شدند"
        rel:
          - ["Sports Illustrated", "نویسندگان جعلی با بیوگرافی‌های تولیدشده توسط هوش مصنوعی"]

      - q: "مشکل Google AI Overviews چه بود؟"
        a: "هوش مصنوعی پست‌های طنز انجمن را به عنوان حقیقت پذیرفت -- مثلاً توصیه به خوردن سنگ کرد. انجمن پزشکی کانادا مشاوره‌های بهداشتی تولیدشده توسط هوش مصنوعی را خطرناک نامید"
        rel:
          - ["Google AI Overviews", "هوش مصنوعی طنز را به عنوان حقیقت پذیرفت"]

      - q: "Perplexity AI با محتوای محافظت‌شده با پی‌وال چه کرد؟"
        a: "به طور سیستماتیک محتوای فوربز و وایرد را سرقت ادبی کرد، از طریق خزنده‌های وب اعلام‌نشده با رشته‌های عامل کاربر جعلی جمع‌آوری و با حداقل ذکر منبع بازتولید کرد"
        rel:
          - ["Perplexity-Plagiat", "جمع‌آوری سیستماتیک محتوای محافظت‌شده"]

      - q: "مهم‌ترین درس از این موارد چیست؟"
        a: "بدون نظارت انسانی و دستورالعمل‌های روشن، خطاهایی پدید می‌آیند که اعتماد خوانندگان را نابود می‌کنند -- انسان در حلقه اختیاری نیست"
        rel:
          - ["Vertrauensverlust", "پیامد استفاده کنترل‌نشده از هوش مصنوعی"]
