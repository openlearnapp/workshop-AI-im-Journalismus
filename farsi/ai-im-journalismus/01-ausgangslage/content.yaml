version: 1
number: 1
title: "وضعیت فعلی: هوش مصنوعی در روزنامه‌نگاری"
description: "چگونه هوش مصنوعی روزنامه‌نگاری را تغییر می‌دهد و چرا تحریریه‌ها باید اکنون اقدام کنند"
sections:
  - title: "هوش مصنوعی روزنامه‌نگاری را تغییر می‌دهد"
    explanation: |
      هوش مصنوعی هم‌اکنون روزنامه‌نگاری را دگرگون می‌کند. می‌تواند در تحقیق کمک کند،
      رونویسی کند، ساختاردهی کند، بنویسد و تحلیل کند. اگر درست استفاده شود، در زمان
      صرفه‌جویی می‌کند و امکانات جدیدی را می‌گشاید. اما اگر بدون کنترل استفاده شود،
      کیفیت، اعتبار و حفاظت از منابع را به خطر می‌اندازد.

      **سوالات کلیدی برای تحریریه‌ها:**
      - هوش مصنوعی کجا ارزش واقعی ایجاد می‌کند؟
      - کجا خطرات پدیدار می‌شوند؟
      - چگونه استانداردهای روزنامه‌نگاری حفظ می‌شوند؟
      - چگونه از کاهش تدریجی کیفیت جلوگیری می‌شود؟
    examples:
      - q: "هدف استفاده ساختاریافته از هوش مصنوعی در روزنامه‌نگاری چیست؟"
        a: "خودکارسازی روزنامه‌نگاری نیست، بلکه آینده‌نگر کردن آن با قوانین روشن، مکانیزم‌های ایمنی و کنترل‌های کیفیت است"
        rel:
          - ["KI-Workflow-Design", "استفاده ساختاریافته از هوش مصنوعی در تحریریه‌ها"]

      - q: "دو جنبه هوش مصنوعی در روزنامه‌نگاری چیست؟"
        a: "اگر درست استفاده شود، در زمان صرفه‌جویی می‌کند و امکانات جدیدی می‌گشاید -- اگر بدون کنترل استفاده شود، کیفیت، اعتبار و حفاظت از منابع را به خطر می‌اندازد"
        rel:
          - ["Chancen und Risiken", "هوش مصنوعی به عنوان شمشیر دولبه در روزنامه‌نگاری"]

      - q: "چرا تحریریه‌ها باید اکنون در مورد هوش مصنوعی اقدام کنند؟"
        a: "زیرا ۲۰۲۵/۲۰۲۶ دوره گذار از آزمایش به یکپارچه‌سازی سیستماتیک است -- کسانی که اکنون ساختار ایجاد نکنند، کاهش کیفیت را تجربه خواهند کرد"
        rel:
          - ["Operationalisierung", "از آزمایش تا یکپارچه‌سازی سیستماتیک هوش مصنوعی"]

      - q: "مشکل اساسی بسیاری از تحریریه‌ها در استفاده از هوش مصنوعی چیست؟"
        a: "تنها ۱۳٪ دستورالعمل‌های رسمی هوش مصنوعی دارند -- استفاده اغلب به روزنامه‌نگاران منفرد واگذار می‌شود که منجر به ناهماهنگی می‌شود"
        rel:
          - ["KI-Richtlinien", "قوانین رسمی برای استفاده از هوش مصنوعی در تحریریه‌ها"]

  - title: "آمار و ارقام پذیرش هوش مصنوعی"
    explanation: |
      پذیرش هوش مصنوعی در روزنامه‌نگاری از قبل بسیار پیشرفته است:

      - **۸۱.۷٪** از روزنامه‌نگاران از ابزارهای هوش مصنوعی در کار خود استفاده می‌کنند
      - **۴۹.۴٪** روزانه از هوش مصنوعی استفاده می‌کنند
      - **۹۷٪** از سازمان‌های خبری اتوماسیون پشتیبان را مهم می‌دانند
      - **۵۳٪** از روزنامه‌نگاران آلمانی به طور فعال از ابزارهای هوش مصنوعی استفاده می‌کنند
      - **۷۰٪** از روزنامه‌نگاران آلمانی عمدتاً برای ترجمه و رونویسی از هوش مصنوعی استفاده می‌کنند
      - **۷۲٪** از شرکت‌های رسانه‌ای قصد دارند تا ۲۰۲۵ فناوری‌های هوش مصنوعی بیشتری را به کار گیرند

      مؤسسه رویترز افزایش استفاده از **هوش مصنوعی عاملی** را برای اتوماسیون
      کامل گردش‌کارهای پیچیده در سال ۲۰۲۶ پیش‌بینی می‌کند.
    examples:
      - q: "چند درصد از روزنامه‌نگاران از ابزارهای هوش مصنوعی استفاده می‌کنند؟"
        a: "۸۱.۷٪ از ابزارهای هوش مصنوعی استفاده می‌کنند که ۴۹.۴٪ آنها روزانه استفاده می‌کنند"
        rel:
          - ["KI-Adoption", "گسترش ابزارهای هوش مصنوعی در روزنامه‌نگاری"]

      - q: "روزنامه‌نگاران آلمانی بیشتر از هوش مصنوعی برای چه کاری استفاده می‌کنند؟"
        a: "برای ترجمه و رونویسی (۷۰٪)"
        rel:
          - ["Transkription", "رایج‌ترین کاربرد هوش مصنوعی در روزنامه‌نگاری آلمان"]

      - q: "هوش مصنوعی عاملی چیست؟"
        a: "سیستم‌های هوش مصنوعی که می‌توانند به طور مستقل گردش‌کارهای پیچیده را اجرا کنند -- روندی که مؤسسه رویترز برای ۲۰۲۶ پیش‌بینی می‌کند"
        rel:
          - ["Agentische KI", "Agentic AI", "اتوماسیون کامل توسط هوش مصنوعی"]

      - q: "چند درصد از سازمان‌های خبری اتوماسیون پشتیبان را مهم می‌دانند؟"
        a: "۹۷٪ طبق گزارش مؤسسه رویترز"
        rel:
          - ["Backend-Automatisierung", "اتوماسیون پشت صحنه در تحریریه‌ها"]

  - title: "پیشگامان و نمونه‌ها"
    explanation: |
      سازمان‌های خبری پیشرو نشان می‌دهند که چگونه می‌توان از هوش مصنوعی به طور مؤثر استفاده کرد:

      - **آسوشیتدپرس (AP)**: پیشگام گزارش‌دهی خودکار با Wordsmith از سال ۲۰۱۴
      - **بی‌بی‌سی**: هوش مصنوعی برای به‌روزرسانی خودکار متن زنده در ورزش
      - **نیویورک‌تایمز**: هرگز از هوش مصنوعی برای نوشتن مقاله استفاده نمی‌کند، اما برای تحلیل حجم زیادی از داده‌ها
      - **دی‌پی‌ای**: تیم هوش مصنوعی اختصاصی از ۲۰۲۵، هاب خبری با دستیار تحقیقاتی هوش مصنوعی
      - **RADAR (بریتانیا)**: تولید حدود ۸,۰۰۰ خبر محلی‌سازی‌شده از داده‌های عمومی

      در آلمان، اشپیگل، فرانکفورتر آلگماینه و تسایت در یک برنامه آزمایشی گوگل
      با بهینه‌سازی دسترسی مبتنی بر هوش مصنوعی آزمایش می‌کنند.
    examples:
      - q: "کدام خبرگزاری پیشگام متون خودکار بود؟"
        a: "آسوشیتدپرس (AP) -- از سال ۲۰۱۴ از متون خودکار گزارش‌های سه‌ماهه با Wordsmith استفاده می‌کند"
        rel:
          - ["Associated Press", "AP", "پیشگام گزارش‌دهی خودکار"]
          - ["Wordsmith", "نرم‌افزار تولید متن خودکار"]

      - q: "نیویورک‌تایمز چگونه از هوش مصنوعی استفاده می‌کند؟"
        a: "هرگز برای نوشتن مقاله، اما برای تحلیل حجم زیادی از داده‌ها -- مثلاً ساعت‌ها مصاحبه و صدها تماس ویدیویی برای تحقیقات تحقیقی"
        rel:
          - ["New York Times", "NYT", "هوش مصنوعی به عنوان ابزار تحلیل، نه نویسنده"]

      - q: "هاب خبری دی‌پی‌ای چیست؟"
        a: "یک دستیار تحقیقاتی هوش مصنوعی که منحصراً به اطلاعات تأیید شده دی‌پی‌ای دسترسی دارد و خلاصه‌هایی با ذکر منبع ارائه می‌دهد"
        rel:
          - ["dpa-News Hub", "دستیار تحقیقاتی هوش مصنوعی خبرگزاری آلمان"]

      - q: "RADAR چیست و چگونه کار می‌کند؟"
        a: "یک خبرگزاری خودکار از PA Media (بریتانیا) که حدود ۸,۰۰۰ خبر محلی‌سازی‌شده از داده‌های عمومی تولید می‌کند -- انسان‌ها جملات را می‌نویسند، نرم‌افزار محلی‌سازی می‌کند"
        rel:
          - ["RADAR", "Reporters and Data and Robots", "اخبار محلی خودکار"]
