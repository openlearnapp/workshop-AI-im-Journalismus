version: 1
number: 7
title: "حفاظت از داده‌ها و حفاظت از منابع"
description: "محرمانگی و امنیت داده‌ها هنگام استفاده از ابزارهای هوش مصنوعی"
sections:
  - title: "خطرات ابزارهای هوش مصنوعی مبتنی بر ابر"
    explanation: |
      استفاده از ابزارهای هوش مصنوعی خطرات قابل توجهی برای حفاظت از منابع دارد:

      - **نشت داده**: ChatGPT حوادث امنیتی داشت که در آن عناوین مکالمات کاربران دیگر نمایش داده شد
      - **داده‌های آموزشی**: ورودی‌ها می‌توانند پردازش، ذخیره و برای آموزش آینده مدل استفاده شوند
      - **محرمانگی**: اطلاعات محرمانه منابع می‌تواند به مدل‌های هوش مصنوعی آینده وارد شود
      - **رمزگذاری**: OpenAI روی رمزگذاری سمت کلاینت کار می‌کند، اما همزمان به سیستم‌های نظارت خودکار اشاره می‌کند

      برای روزنامه‌نگارانی که با اطلاعات حساس منابع کار می‌کنند، این
      خطرات می‌تواند وجودی باشد -- نشت داده می‌تواند منابع را به خطر بیندازد.
    examples:
      - q: "چرا ابزارهای هوش مصنوعی مبتنی بر ابر برای حفاظت از منابع خطرناک هستند؟"
        a: "ورودی‌ها می‌توانند ذخیره و برای آموزش مدل استفاده شوند -- اطلاعات محرمانه منابع می‌تواند به مدل‌های هوش مصنوعی آینده وارد شود"
        rel:
          - ["Cloud-KI-Risiko", "داده‌های محرمانه می‌توانند وارد آموزش مدل شوند"]

      - q: "چه حادثه امنیتی در ChatGPT رخ داد؟"
        a: "برخی کاربران عناوین مکالمات کاربران دیگر را دیدند -- برای روزنامه‌نگاران با منابع حساس بسیار مشکل‌ساز"
        rel:
          - ["ChatGPT-Datenleck", "عناوین مکالمات کاربران دیگر قابل مشاهده بود"]

      - q: "مشکل اسکن سمت کلاینت در ابزارهای هوش مصنوعی چیست؟"
        a: "رمزگذاری را تضعیف و خطر حمله را افزایش می‌دهد -- حتی اگر رسماً برای امنیت باشد"
        rel:
          - ["Client-Side-Scanning", "تضعیف رمزگذاری علی‌رغم وعده‌های امنیتی"]

      - q: "چرا سیاست حریم خصوصی به تنهایی کافی نیست؟"
        a: "مطالعات شکاف‌های قابل توجهی در درک کاربران از شیوه‌های داده‌ای ارائه‌دهندگان هوش مصنوعی نشان می‌دهند -- نگرانی‌هایی درباره دسترسی غیرمجاز به داده و نگهداری طولانی داده وجود دارد"
        rel:
          - ["Datenschutz-Transparenz", "شکاف بین وعده‌ها و عمل"]

  - title: "اقدامات حفاظتی عملی"
    explanation: |
      روزنامه‌نگاران می‌توانند با اقدامات مشخص از خود محافظت کنند:

      ۱. **داده‌های محرمانه در ابزارهای هوش مصنوعی وارد نکنید**: به‌ویژه در سرویس‌های مبتنی بر ابر مانند ChatGPT، Copilot یا Gemini
      ۲. **از چت موقت استفاده کنید**: چت موقت ChatGPT مکالمات را ذخیره نمی‌کند و برای آموزش استفاده نمی‌کند
      ۳. **مدل‌های هوش مصنوعی محلی**: برای تحقیقات حساس، مدل‌های محلی (مثلاً Ollama/Llama) جایگزین امن‌تری هستند
      ۴. **ابزارهای سازگار با GDPR**: ابزارهای اروپایی مانند Trint ذخیره‌سازی داده در اتحادیه اروپا و سیاست عدم آموزش ارائه می‌دهند
      ۵. **دستورالعمل‌های تحریریه**: قوانین داخلی روشن درباره اینکه چه اطلاعاتی در ابزارهای هوش مصنوعی وارد شود

      مفهوم تعریف می‌کند: **حفاظت از منابع بر کارایی اولویت دارد.**
    examples:
      - q: "آیا اسناد محرمانه را می‌توان در ChatGPT آپلود کرد؟"
        a: "خیر -- سرویس‌های هوش مصنوعی خارجی می‌توانند داده‌ها را ذخیره و برای آموزش استفاده کنند. مواد محرمانه جایشان در ابزارهای هوش مصنوعی ابری نیست"
        rel:
          - ["Vertraulichkeit", "داده‌های حساس در ابزارهای هوش مصنوعی خارجی نه"]

      - q: "چت موقت در ChatGPT چیست؟"
        a: "حالتی که مکالمات را در تاریخچه ذخیره نمی‌کند و برای آموزش استفاده نمی‌کند -- نگهداری حداکثر ۳۰ روز در OpenAI"
        rel:
          - ["Temporary Chat", "حالت ذخیره‌نشده در ChatGPT"]

      - q: "مدل‌های هوش مصنوعی محلی چیستند و چرا امن‌تر هستند؟"
        a: "مدل‌هایی مانند Ollama/Llama روی کامپیوتر خودتان اجرا می‌شوند -- داده‌ها هرگز دستگاه را ترک نمی‌کنند که حفاظت از منابع را به‌طور قابل توجهی بهبود می‌بخشد"
        rel:
          - ["Lokale KI", "مدل‌های هوش مصنوعی روی کامپیوتر خودتان"]
          - ["Ollama", "ابزار اجرای محلی مدل‌های هوش مصنوعی"]

      - q: "سیاست عدم آموزش در Trint چه معنایی دارد؟"
        a: "Trint از داده‌های صوتی و متنی آپلودشده برای آموزش مدل‌های هوش مصنوعی خود استفاده نمی‌کند -- مزیت تعیین‌کننده‌ای برای تحریریه‌های اروپایی و حفاظت از منابع"
        rel:
          - ["No-Training-Policy", "ارائه‌دهنده از داده‌های کاربر برای آموزش مدل استفاده نمی‌کند"]

  - title: "اجتناب از ورود داده‌های حساس"
    explanation: |
      تحریریه‌ها به قوانین روشنی نیاز دارند درباره اینکه چه چیزی در ابزارهای هوش مصنوعی وارد شود:

      **هرگز در ابزارهای هوش مصنوعی خارجی وارد نکنید:**
      - نام و اطلاعات تماس منابع محرمانه
      - مواد منتشرنشده و نتایج تحقیقات انحصاری
      - اسناد داخلی تحریریه و اوراق استراتژی
      - داده‌های شخصی (GDPR!)
      - مواد از پرونده‌های حقوقی جاری

      **استفاده امن:**
      - اطلاعات عمومی در دسترس
      - مقالات قبلاً منتشرشده برای خلاصه‌سازی
      - سوالات تحقیقاتی عمومی بدون زمینه حساس
      - ترجمه بیانیه‌های مطبوعاتی عمومی
    examples:
      - q: "چه اطلاعاتی هرگز نباید در ابزارهای هوش مصنوعی خارجی وارد شوند؟"
        a: "نام منابع محرمانه، مواد منتشرنشده، اسناد داخلی، داده‌های شخصی و مواد از پرونده‌های حقوقی جاری"
        rel:
          - ["Sensible Daten", "اطلاعاتی که هرگز جایشان در ابزارهای هوش مصنوعی نیست"]

      - q: "چه اطلاعاتی را می‌توان با اطمینان در ابزارهای هوش مصنوعی پردازش کرد؟"
        a: "اطلاعات عمومی در دسترس، مقالات قبلاً منتشرشده، سوالات تحقیقاتی عمومی و بیانیه‌های مطبوعاتی عمومی"
        rel:
          - ["Sichere Nutzung", "داده‌های بی‌خطر برای پردازش هوش مصنوعی"]

      - q: "چه اصل راهنمایی در تنش بین کارایی و حفاظت از منابع اعمال می‌شود؟"
        a: "حفاظت از منابع بر کارایی اولویت دارد -- اطلاعات حساس جایشان در سیستم‌های خارجی نیست، حتی اگر هوش مصنوعی کار را تسریع کند"
        rel:
          - ["Quellenschutz vor Effizienz", "امنیت بر سرعت اولویت دارد"]

      - q: "یک تحریریه چگونه باید قوانین ورود داده به هوش مصنوعی را اجرا کند؟"
        a: "از طریق دستورالعمل‌های داخلی روشن با مثال‌های مشخص، آموزش برای همه کارکنان و بازبینی‌های منظم رعایت"
        rel:
          - ["Interne KI-Richtlinien", "قوانین مشخص برای مدیریت داده در ابزارهای هوش مصنوعی"]
